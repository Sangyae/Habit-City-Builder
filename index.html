<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit City Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:,">
</head>
<body class="bg-zinc-950 text-white h-full overflow-hidden tail-container relative">

  <div id="auth-screen" class="flex items-center justify-center h-full absolute inset-0 z-50 bg-zinc-950">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md border border-zinc-800 shadow-2xl text-center">
      <div class="text-5xl mb-4">🏙️</div>
      <h2 class="text-3xl font-bold mb-2">Habit City</h2>
      <p class="text-zinc-400 mb-8">Login to grow your metropolis</p>
      
      <div class="space-y-4 text-left">
        <div>
          <label class="text-xs uppercase tracking-widest text-zinc-500 ml-1">Email</label>
          <input id="auth-email" type="email" placeholder="email@example.com" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mt-1 focus:border-yellow-400 outline-none">
        </div>
        <div>
          <label class="text-xs uppercase tracking-widest text-zinc-500 ml-1">Password</label>
          <input id="auth-password" type="password" placeholder="••••••••" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mt-1 focus:border-yellow-400 outline-none">
        </div>
        
        <div class="flex gap-2 pt-2">
          <button type="button" id="login-btn" class="flex-1 bg-yellow-400 text-zinc-900 font-bold py-4 rounded-2xl hover:bg-yellow-300 transition">Login</button>
          <button type="button" id="signup-btn" class="flex-1 bg-zinc-700 text-white font-bold py-4 rounded-2xl hover:bg-zinc-600 transition">Sign Up</button>
        </div>
        
        <button type="button" id="google-btn" class="w-full bg-white text-zinc-900 font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-zinc-100 transition">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>
      </div>
    </div>
  </div>

  <div id="app-container" class="hidden flex flex-col h-screen">
    <header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between z-40">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-900 text-2xl shadow-inner">🏙️</div>
        <span class="logo-font text-2xl font-semibold">Habit City <span class="text-yellow-400">Builder</span></span>
      </div>
      <div class="flex items-center gap-4">
        <span id="user-display" class="text-sm text-zinc-400 hidden md:block"></span>
        <button id="sync-github-btn" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-2 rounded-3xl text-sm font-semibold transition"><i class="fa-brands fa-github mr-2"></i>Sync GitHub</button>
        <button id="view-btn" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-2 rounded-3xl text-sm font-semibold transition">View Stats</button>
        <button id="logout-btn" class="text-xs bg-red-900/10 text-red-400 hover:bg-red-900/20 px-4 py-2 rounded-xl border border-red-900/20 transition">Logout</button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <div class="w-96 bg-white text-zinc-900 flex flex-col border-r border-zinc-200 z-30">
            <div class="px-6 pt-8 pb-6 border-b">
                <div class="flex justify-between items-end mb-2">
                    <h1 class="text-3xl font-bold tracking-tight">Daily Habits</h1>
                    <div class="text-right">
                        <div class="text-4xl font-bold text-yellow-400 tabular-nums" id="completed-count">0</div>
                    </div>
                </div>
                <div class="h-3 bg-zinc-100 rounded-3xl mt-4 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-yellow-400 transition-all duration-700 w-0"></div>
                </div>
                <div class="flex justify-between items-center mt-1">
                  <span class="text-[10px] text-zinc-400 uppercase font-bold tracking-tighter">City Growth</span>
                  <span id="progress-perc" class="text-xs font-mono text-yellow-600 font-bold">0%</span>
                </div>
            </div>
            <div id="tasks-list" class="flex-1 overflow-auto p-4 space-y-3">
                </div>
            <div class="p-4 border-t bg-white">
                <button id="show-modal-btn" class="w-full bg-zinc-900 hover:bg-black text-white py-4 rounded-3xl font-semibold transition">
                    <i class="fa-solid fa-plus mr-2"></i> Add Custom Task
                </button>
            </div>
        </div>

        <div class="flex-1 flex flex-col relative bg-zinc-900">
            <div id="city" class="flex-1 relative bg-gradient-to-b from-sky-400 to-sky-200">
              <div class="sun absolute top-12 right-16 w-28 h-28 bg-yellow-300 rounded-full shadow-[0_0_80px_40px] shadow-yellow-300 z-10"></div>
              
              <div id="clouds-container" class="absolute inset-0 z-10 overflow-hidden"></div>
              
              <div id="buildings-container" class="absolute bottom-24 left-0 right-0 h-3/4 z-20 flex items-end justify-around px-8"></div>
              
              <div class="road absolute bottom-0 left-0 right-0 h-28 z-30">
                <div class="road-lines absolute bottom-9 left-0 right-0 h-1"></div>
                <div id="cars-container" class="absolute bottom-2 left-0 right-0 h-16 z-40 overflow-hidden"></div>
              </div>
              
              </div>

            <div id="stats-view" class="hidden absolute inset-0 bg-zinc-950 p-8 overflow-auto z-30">
                <h2 class="text-3xl font-bold mb-8">Progress Analytics</h2>
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 h-96">
                    <canvas id="progress-chart"></canvas>
                </div>
            </div>
        </div>
    </div>
  </div>

  <div id="modal-backdrop" class="hidden fixed inset-0 bg-black/70 items-center justify-center z-50">
    <div class="bg-white text-zinc-900 rounded-3xl w-full max-w-md mx-4 overflow-hidden shadow-2xl">
      <div class="px-8 py-6 border-b"><h3 class="text-2xl font-semibold">Add Custom Task</h3></div>
      <div class="p-8 space-y-6">
        <div>
          <label class="block text-xs uppercase tracking-widest mb-2 font-bold text-zinc-500">Task name</label>
          <input id="custom-task-name" type="text" placeholder="e.g. Read 20 pages" class="w-full border border-zinc-300 focus:border-yellow-400 rounded-2xl px-5 py-4 outline-none">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest mb-2 font-bold text-zinc-500">Category</label>
          <select id="custom-task-category" class="w-full border border-zinc-300 rounded-2xl px-5 py-4 outline-none">
            <option value="Custom">Custom</option>
            <option value="Fitness">Fitness</option>
            <option value="Git">Git</option>
            <option value="Screen">Screen Time</option>
          </select>
        </div>
      </div>
      <div class="flex border-t">
        <button type="button" id="close-modal-btn" class="flex-1 py-6 text-zinc-400 font-semibold hover:bg-zinc-50">Cancel</button>
        <button type="button" id="add-task-btn" class="flex-1 py-6 bg-yellow-400 hover:bg-yellow-300 text-zinc-900 font-semibold">Add to City</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
