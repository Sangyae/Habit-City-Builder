<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habit City Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white h-full overflow-hidden tail-container">

  <div id="auth-screen" class="flex items-center justify-center h-full">
    <div class="bg-zinc-900 p-8 rounded-3xl w-full max-w-md border border-zinc-800 shadow-2xl text-center">
      <div class="text-5xl mb-4">🏙️</div>
      <h2 class="text-3xl font-bold mb-2">Habit City</h2>
      <p class="text-zinc-400 mb-8">Login to grow your metropolis</p>
      
      <div class="space-y-4 text-left">
        <div>
          <label class="text-xs uppercase tracking-widest text-zinc-500 ml-1">Email</label>
          <input id="auth-email" type="email" placeholder="email@example.com" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mt-1 focus:border-yellow-400 outline-none">
        </div>
        <div>
          <label class="text-xs uppercase tracking-widest text-zinc-500 ml-1">Password</label>
          <input id="auth-password" type="password" placeholder="••••••••" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 mt-1 focus:border-yellow-400 outline-none">
        </div>
        
        <div class="flex gap-2 pt-2">
          <button id="login-btn" class="flex-1 bg-yellow-400 text-zinc-900 font-bold py-4 rounded-2xl hover:bg-yellow-300 transition">Login</button>
          <button id="signup-btn" class="flex-1 bg-zinc-700 text-white font-bold py-4 rounded-2xl hover:bg-zinc-600 transition">Sign Up</button>
        </div>
        
        <button id="google-btn" class="w-full bg-white text-zinc-900 font-bold py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-zinc-100 transition">
          <i class="fa-brands fa-google"></i> Continue with Google
        </button>
      </div>
    </div>
  </div>

  <div id="app-container" class="hidden flex flex-col h-screen">
    <header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-x-3">
        <div class="w-9 h-9 bg-yellow-400 rounded-2xl flex items-center justify-center text-zinc-900 text-2xl shadow-inner">🏙️</div>
        <span class="logo-font text-2xl font-semibold">Habit City <span class="text-yellow-400">Builder</span></span>
      </div>
      <div class="flex items-center gap-4">
        <span id="user-display" class="text-sm text-zinc-400 hidden md:block"></span>
        <button id="view-btn" class="bg-zinc-800 hover:bg-zinc-700 px-6 py-2 rounded-3xl text-sm font-semibold transition">View Stats</button>
        <button id="logout-btn" class="text-xs bg-red-900/10 text-red-400 hover:bg-red-900/20 px-4 py-2 rounded-xl border border-red-900/20 transition">Logout</button>
      </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <div class="w-96 bg-white text-zinc-900 flex flex-col border-r border-zinc-200">
            <div class="px-6 pt-8 pb-6 border-b">
                <h1 class="text-2xl font-bold tracking-tight">Daily Habits</h1>
                <div class="h-3 bg-zinc-100 rounded-3xl mt-4 overflow-hidden">
                    <div id="progress-bar" class="h-full bg-yellow-400 transition-all duration-700 w-0"></div>
                </div>
                <div class="flex justify-between items-center mt-1">
                  <span class="text-[10px] text-zinc-400 uppercase font-bold tracking-tighter">City Growth</span>
                  <span id="progress-perc" class="text-xs font-mono text-yellow-600 font-bold">0%</span>
                </div>
            </div>
            <div id="tasks-list" class="flex-1 overflow-auto p-4 space-y-3">
                </div>
        </div>

        <div class="flex-1 flex flex-col relative bg-zinc-900">
            <div id="city-view" class="flex-1 relative overflow-hidden">
                <div id="city" class="h-full">
                    <div class="sun absolute top-12 right-16 w-24 h-24 bg-yellow-300 rounded-full shadow-[0_0_80px_rgba(253,224,71,0.6)]"></div>
                    <div id="buildings-container" class="absolute bottom-24 left-0 right-0 h-3/4 flex items-end justify-around px-8 z-20">
                        </div>
                    <div class="road absolute bottom-0 w-full h-24 bg-zinc-800 z-10">
                        <div class="road-lines h-1 w-full absolute top-1/2 border-t border-dashed border-yellow-500/50"></div>
                    </div>
                </div>
            </div>

            <div id="stats-view" class="hidden absolute inset-0 bg-zinc-950 p-8 overflow-auto z-30">
                <h2 class="text-3xl font-bold mb-8">Progress Analytics</h2>
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-3xl">
                        <div class="text-zinc-500 text-xs uppercase tracking-widest font-bold">Avg Completion</div>
                        <div id="avg-completion" class="text-5xl font-bold mt-2 text-yellow-400">0%</div>
                    </div>
                </div>
                <div class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 h-96">
                    <canvas id="progress-chart"></canvas>
                </div>
            </div>
        </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
